<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 44" fill="none">
  <!-- Philagora Nav Lockup B — Inline with separator -->
  <g transform="translate(18, 22)">
    <!-- Simplified wreath -->
    <g opacity="0.6">
      <path d="M-8 14 Q-15 6 -14 -4 Q-12 -10 -8 -16" fill="none" stroke="currentColor" stroke-width="0.7"/>
      <ellipse cx="-12" cy="8" rx="2.5" ry="5" fill="currentColor" transform="rotate(-20,-12,8)" opacity="0.5"/>
      <ellipse cx="-14" cy="-2" rx="2.5" ry="5" fill="currentColor" transform="rotate(-5,-14,-2)" opacity="0.5"/>
      <ellipse cx="-11" cy="-11" rx="2" ry="4.5" fill="currentColor" transform="rotate(15,-11,-11)" opacity="0.5"/>
      <path d="M8 14 Q15 6 14 -4 Q12 -10 8 -16" fill="none" stroke="currentColor" stroke-width="0.7"/>
      <ellipse cx="12" cy="8" rx="2.5" ry="5" fill="currentColor" transform="rotate(20,12,8)" opacity="0.5"/>
      <ellipse cx="14" cy="-2" rx="2.5" ry="5" fill="currentColor" transform="rotate(5,14,-2)" opacity="0.5"/>
      <ellipse cx="11" cy="-11" rx="2" ry="4.5" fill="currentColor" transform="rotate(-15,11,-11)" opacity="0.5"/>
    </g>
    <!-- Phi -->
    <circle cx="0" cy="0" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <line x1="0" y1="-16" x2="0" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="-2.5" y1="-16" x2="2.5" y2="-16" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <line x1="-2.5" y1="16" x2="2.5" y2="16" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <!-- Separator -->
    <line x1="24" y1="-12" x2="24" y2="12" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
    <!-- Wordmark -->
    <text font-family="'Playfair Display', Georgia, serif" font-size="18" letter-spacing="1.5" fill="currentColor" x="32" y="6">Philagora</text>
  </g>
</svg>
