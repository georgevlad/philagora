    <line x1="0" y1="-18" x2="0" y2="18" stroke="#3C4A3A" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-3" y1="-18" x2="3" y2="-18" stroke="#3C4A3A" stroke-width="1" stroke-linecap="round"/>
    <line x1="-3" y1="18" x2="3" y2="18" stroke="#3C4A3A" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>
