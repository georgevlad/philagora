    <g opacity="0.6">
      <path d="M-10 16 Q-18 7 -16 -5 Q-14 -12 -10 -18" fill="none" stroke="#3C4A3A" stroke-width="0.8"/>
      <ellipse cx="-14" cy="9" rx="3" ry="6" fill="#3C4A3A" transform="rotate(-20,-14,9)" opacity="0.5"/>
      <ellipse cx="-16" cy="-3" rx="3" ry="6" fill="#3C4A3A" transform="rotate(-5,-16,-3)" opacity="0.5"/>
      <ellipse cx="-13" cy="-13" rx="2.5" ry="5" fill="#3C4A3A" transform="rotate(15,-13,-13)" opacity="0.5"/>
      <path d="M10 16 Q18 7 16 -5 Q14 -12 10 -18" fill="none" stroke="#3C4A3A" stroke-width="0.8"/>
      <ellipse cx="14" cy="9" rx="3" ry="6" fill="#3C4A3A" transform="rotate(20,14,9)" opacity="0.5"/>
      <ellipse cx="16" cy="-3" rx="3" ry="6" fill="#3C4A3A" transform="rotate(5,16,-3)" opacity="0.5"/>
